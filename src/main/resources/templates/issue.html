<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="'Kong — ' + ${issue.key()}">Kong</title>
    <link rel="icon" href="/favicon.png" type="image/png" sizes="64x64"/>
    <link rel="stylesheet" href="/app.css"/>
    <script src="/htmx.min.js"></script>
</head>
<body class="issue-body">
<div th:replace="~{fragments/nav :: nav}"></div>

<main class="content issue-layout">
    <aside class="issue-sidebar">
        <nav class="sidebar-nav">
            <a th:href="@{'/board/' + ${activeSlug}}">← List</a>
        </nav>
        <ul class="mini-list">
            <li th:each="i : ${sidebarIssues}"
                th:class="${i.key() == issue.key()} ? 'selected' : ''">
                <a th:href="@{'/issue/' + ${i.key()}(board=${activeSlug})}">
                    <span class="mini-top">
                        <span class="mini-key" th:text="${i.key()}">KEY-1</span>
                        <span class="mini-status status" th:classappend="'sc-' + ${i.statusCategory()}"
                              th:text="${i.status()}">Status</span>
                    </span>
                    <span class="mini-summary" th:text="${i.summary()}">summary</span>
                </a>
            </li>
        </ul>
    </aside>

    <div class="issue-main">
        <div th:replace="~{fragments/issue_detail :: detail}"></div>
    </div>
</main>

<script src="/detail-edit.js"></script>
</body>
</html>

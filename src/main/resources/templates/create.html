<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Jira Manager — Create Task</title>
    <link rel="stylesheet" href="/app.css"/>
    <script src="/htmx.min.js"></script>
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<main class="content">
    <div th:if="${!jiraReady}" class="banner">
        No Jira credentials configured — issues can't be created. Add your API token to
        <code>config.local.properties</code> and restart.
    </div>

    <h1>Create Task</h1>

    <p th:if="${jiraReady and projects.isEmpty()}" class="empty">
        No projects available to create issues in.
    </p>

    <form th:if="${!projects.isEmpty()}" class="create-form" method="post" action="/create">
        <label class="field">
            <span class="field-label">Project</span>
            <select id="project" name="project" required onchange="syncFields()">
                <option th:each="p : ${projects}" th:value="${p.key()}"
                        th:text="${p.key()} + ' — ' + ${p.name()}"
                        th:selected="${p.key() == defaultProjectKey}">PROJ</option>
            </select>
        </label>

        <label class="field">
            <span class="field-label">Issue Type</span>
            <select id="issuetype" name="issuetype" required>
                <th:block th:each="p : ${projects}">
                    <option th:each="t : ${p.issueTypes()}"
                            th:value="${t.id()}" th:text="${t.name()}"
                            th:attr="data-project=${p.key()}">Type</option>
                </th:block>
            </select>
        </label>

        <label class="field">
            <span class="field-label">Summary</span>
            <input type="text" name="summary" required maxlength="255"
                   placeholder="Short, specific title"/>
        </label>

        <label class="field">
            <span class="field-label">Reporter</span>
            <div class="reporter-field">
                <input type="text" id="reporter-input" name="reporterName" autocomplete="off"
                       th:value="${currentUserName}" placeholder="Type a name…"
                       oninput="document.getElementById('reporter-account').value=''"
                       hx-get="/users/suggest"
                       hx-trigger="keyup changed delay:250ms"
                       hx-target="#reporter-suggestions" hx-swap="innerHTML"
                       hx-include="#project"/>
                <input type="hidden" id="reporter-account" name="reporter"
                       th:value="${currentUserAccountId}"/>
                <div id="reporter-suggestions" class="suggestions"></div>
            </div>
        </label>

        <label class="field">
            <span class="field-label">Description</span>
            <textarea name="description" rows="8" placeholder="Optional details…"></textarea>
        </label>

        <label class="field">
            <span class="field-label">Specification Details</span>
            <textarea name="specDetail" rows="18" th:text="${specTemplate}"
                      placeholder="Optional…"></textarea>
        </label>

        <label class="field">
            <span class="field-label">Compliance/Regulatory Attribute</span>
            <select name="compliance">
                <option value="">— none —</option>
                <option th:each="c : ${complianceOptions}" th:value="${c}" th:text="${c}">Yes</option>
            </select>
        </label>

        <div class="create-actions">
            <button type="submit">Create Task</button>
            <a class="btn-secondary" th:href="${backHref}">Cancel</a>
        </div>
    </form>
</main>

<script>
    // Issue-type and Reporter options for every project are rendered up front,
    // each tagged with data-project; show only those for the selected project and
    // keep a valid one selected. For Reporter, prefer the current user.
    function filterByProject(selectId, proj, preferCurrent) {
        var sel = document.getElementById(selectId);
        if (!sel) return;
        var firstVisible = null, current = null;
        for (var i = 0; i < sel.options.length; i++) {
            var opt = sel.options[i];
            var match = opt.getAttribute('data-project') === proj;
            opt.hidden = !match;
            opt.disabled = !match;
            if (match) {
                if (firstVisible === null) firstVisible = opt;
                if (preferCurrent && opt.getAttribute('data-current') === 'true') current = opt;
            }
        }
        var pick = current || firstVisible;
        if (pick && (sel.selectedIndex < 0 || sel.options[sel.selectedIndex].hidden)) {
            pick.selected = true;
        }
    }
    function syncFields() {
        filterByProject('issuetype', document.getElementById('project').value, false);
    }
    document.addEventListener('DOMContentLoaded', syncFields);

    // Reporter type-ahead: clicking a suggestion fills the visible name and the
    // hidden account id; clicking anywhere else dismisses the suggestion list.
    document.addEventListener('click', function (e) {
        var item = e.target.closest('.suggest-item');
        var box = document.getElementById('reporter-suggestions');
        if (item) {
            document.getElementById('reporter-input').value = item.getAttribute('data-name');
            document.getElementById('reporter-account').value = item.getAttribute('data-account');
            if (box) box.innerHTML = '';
        } else if (box && !e.target.closest('.reporter-field')) {
            box.innerHTML = '';
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="'Jira Manager — ' + ${title}">Jira Manager</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
    <link rel="stylesheet" href="/app.css"/>
    <script src="/htmx.min.js"></script>
    <script src="/detail-edit.js"></script>
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<main class="content kanban-content">
    <div th:if="${!jiraReady}" class="banner">
        No Jira credentials configured. Add your API token to
        <code>config.local.properties</code> and restart.
    </div>

    <div class="kanban-head">
        <h1 th:text="${title}">Kanban</h1>
        <a class="view-toggle" th:href="@{'/board/' + ${boardSlug}}">LIST</a>
    </div>

    <div class="kanban" th:if="${!columns.isEmpty()}">
        <section class="kanban-col" th:each="c : ${columns}"
                 th:classappend="${c.overWip()} ? 'over-wip' : ''">
            <header class="kanban-col-head">
                <span class="status" th:classappend="'sc-' + ${c.statusCategory()}"
                      th:text="${c.status()}">Status</span>
                <span class="kanban-count" th:classappend="${c.overWip()} ? 'over' : ''"
                      th:title="'Cards / WIP limit'">
                    <span th:text="${c.cardCount()}">0</span>/<span th:text="${c.wipLimit()}">0</span>
                </span>
            </header>
            <div class="kanban-cards">
                <div class="kanban-group" th:each="g, gs : ${c.groups()}">
                    <div class="kanban-group-sep" th:unless="${gs.first}"></div>
                    <ul class="kanban-group-list">
                        <li class="kanban-card" th:each="i : ${g.issues()}"
                            th:classappend="${i.key() == highlight} ? 'highlighted' : ''">
                            <a href="#" onclick="openIssueModal(this); return false;"
                               th:attr="hx-get=@{'/issue/' + ${i.key()} + '/detail'}, data-key=${i.key()}"
                               hx-target="#issue-modal-body" hx-swap="innerHTML">
                                <div class="kanban-card-top">
                                    <span class="kanban-key-wrap">
                                        <span class="mini-key" th:text="${i.key()}">KEY-1</span>
                                        <button th:replace="~{fragments/icons :: copyLink(${jiraBaseUrl} + '/browse/' + ${i.key()}, ${i.key()})}"></button>
                                    </span>
                                    <span class="kanban-card-top-right">
                                        <span class="status kanban-status" th:if="${i.status() != c.status()}"
                                              th:classappend="'sc-' + ${i.statusCategory()}"
                                              th:text="${i.status()}">Status</span>
                                        <span th:if="${i.checklistsComplete()}" class="badge badge-yes"
                                              title="Checklists complete">✓</span>
                                        <span th:unless="${i.checklistsComplete()}" class="badge badge-no"
                                              title="Checklists incomplete">✗</span>
                                    </span>
                                </div>
                                <div class="kanban-card-summary" th:text="${i.summary()}">summary</div>
                                <div class="kanban-tester"
                                     th:if="${i.status() == 'Ready to Test' or i.status() == 'Testing' or i.status() == 'Revisions Pending'}">
                                    <span class="kanban-tester-label">Tester</span>
                                    <span class="kanban-tester-name" th:text="${i.devTesterDisplay()}">Name</span>
                                </div>
                                <div class="kanban-card-foot">
                                    <span class="kanban-type" th:text="${i.issueType()}">Type</span>
                                    <span class="kanban-assignee" th:text="${i.assignee()}">Assignee</span>
                                    <span class="kanban-days" th:title="'Days in status'"
                                          th:text="${i.daysInStatusDisplay()} + 'd'">0d</span>
                                </div>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </section>
    </div>

    <p th:if="${columns.isEmpty()}" class="empty">No active items.</p>
</main>

<!-- Issue detail modal: a card loads the detail fragment into the body. -->
<div id="issue-modal" class="modal-overlay" hidden>
    <div class="modal-box">
        <div class="modal-bar">
            <span class="modal-bar-left">
                <a id="modal-open-tab" class="modal-open-tab" target="_blank" rel="noopener"
                   href="#">Open in Tab ↗</a>
                <button type="button" class="modal-jump" onclick="jumpToComments()">↓ Comments</button>
            </span>
            <button type="button" class="modal-close" aria-label="Close"
                    onclick="closeIssueModal()">&times;</button>
        </div>
        <div id="issue-modal-body"></div>
    </div>
    <button type="button" class="modal-top" onclick="scrollModalTop()">↑ Top</button>
</div>

<script>
    function openIssueModal(el) {
        var key = el && el.getAttribute('data-key');
        var link = document.getElementById('modal-open-tab');
        if (link && key) link.href = '/issue/' + key;
        document.getElementById('issue-modal').hidden = false;
        document.body.style.overflow = 'hidden';
    }
    function closeIssueModal() {
        document.getElementById('issue-modal').hidden = true;
        document.getElementById('issue-modal-body').innerHTML = '';
        document.body.style.overflow = '';
    }
    function jumpToComments() {
        var c = document.querySelector('#issue-modal-body .comments');
        if (c) c.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
    // Close on backdrop click or Escape.
    document.getElementById('issue-modal').addEventListener('click', function (e) {
        if (e.target === this) closeIssueModal();
    });
    function scrollModalTop() {
        document.getElementById('issue-modal').scrollTo({ top: 0, behavior: 'smooth' });
    }
    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeIssueModal();
    });
    // Bring the spotlighted card (returned from its detail page) into view.
    (function () {
        var card = document.querySelector('.kanban-card.highlighted');
        if (card) card.scrollIntoView({ block: 'center', inline: 'center' });
    })();
</script>
</body>
</html>

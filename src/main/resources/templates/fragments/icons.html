<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- Copy-to-clipboard button for a Jira browse link; JS reads data-jira-url. -->
<button xmlns:th="http://www.thymeleaf.org" th:fragment="copyLink(url, key)"
        type="button" class="copy-link" title="Click: copy Jira link · Right-click: copy app link"
        th:attr="data-jira-url=${url}, data-key=${key}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
    </svg>
</button>

<!-- Open the task in the Jira app in a new tab (JS opens it; works inside the card anchor too). -->
<button xmlns:th="http://www.thymeleaf.org" th:fragment="openJira(url)"
        type="button" class="open-jira" title="Open in Jira" th:attr="data-jira-url=${url}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/>
        <line x1="10" y1="14" x2="21" y2="3"/>
    </svg>
</button>
</body>
</html>

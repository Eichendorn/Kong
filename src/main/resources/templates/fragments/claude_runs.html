<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- Polls itself every 3s while any run is still RUNNING, then stops. -->
<div th:fragment="runs" id="claude-runs"
     th:attr="hx-get=@{'/issue/' + ${issue.key()} + '/claude/runs'},
              hx-trigger=${runs.{? #this.status.name() == 'RUNNING'}.isEmpty()} ? null : 'every 3s'"
     hx-swap="outerHTML">

    <p th:if="${runs.isEmpty()}" class="muted">No Claude runs this session.</p>

    <div th:each="r : ${runs}" class="run" th:classappend="'run-' + ${r.status.name().toLowerCase()}">
        <div class="run-head">
            <code th:text="${r.command}">/skill KEY-1</code>
            <span class="run-status" th:text="${r.statusLabel()}">status</span>
        </div>
        <pre class="run-output" th:if="${!r.output.isBlank()}" th:text="${r.output}">output</pre>
    </div>
</div>
</body>
</html>

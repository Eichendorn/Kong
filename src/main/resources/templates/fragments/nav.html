<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="nav" class="topbar">
    <a class="brand" href="/"><img class="brand-mark" src="/kong-mark.png" alt="" aria-hidden="true"/>Kong</a>
    <a class="version" href="/history" title="Revision history"
       th:text="'v' + ${version}">v?</a>
    <nav class="boards">
        <select class="board-select" aria-label="Board"
                onchange="if (this.value) window.location.href = this.value;">
            <option th:each="b : ${boards}"
                    th:value="@{'/board/' + ${b.slug()}}"
                    th:text="${b.label()}"
                    th:selected="${b.slug()} == ${activeSlug}">Board</option>
        </select>
    </nav>
    <a th:if="${showKanbanNav}" class="view-toggle nav-kanban"
       th:href="@{'/kanban/' + ${navSlug}}">KANBAN</a>
    <a th:if="${showListNav}" class="view-toggle nav-list"
       th:href="@{'/board/' + ${navSlug}}">WIP List</a>
    <a th:if="${showSpecifyDoneNav}" class="view-toggle nav-specify-done"
       th:href="@{'/specify-done/' + ${navSlug}}">Specify Done</a>
    <select th:if="${showPersonFilter}" class="person-select" aria-label="Filter by person"
            th:classappend="${selectedPerson != null and !selectedPerson.isEmpty()} ? 'filtered' : ''"
            onchange="window.location.href = this.value;">
        <option th:value="@{'/kanban/' + ${activeSlug}}"
                th:selected="${selectedPerson == null or selectedPerson.isEmpty()}">All people</option>
        <option th:each="p : ${people}"
                th:value="@{'/kanban/' + ${activeSlug}(person=${p})}"
                th:text="${p}"
                th:selected="${p == selectedPerson}">Name</option>
    </select>
    <form class="key-search" method="get" th:action="@{/goto}" role="search">
        <input type="text" name="key" placeholder="Go to task key…"
               aria-label="Go to a Jira task by key" autocomplete="off" spellcheck="false"/>
    </form>
    <details class="nav-menu">
        <summary>Maintenance ▾</summary>
        <div class="nav-menu-items">
            <a href="/maintenance/transitions">Recent Transitions</a>
            <a href="/maintenance/workflow">Workflow Diagram</a>
        </div>
    </details>
    <a class="nav-settings" href="/settings" title="Settings">⚙ Settings</a>
    <span th:if="${currentUserName != null and !currentUserName.isEmpty()}"
          class="nav-user" th:title="'Signed in to Jira as ' + ${currentUserName}">
        <img class="nav-user-avatar" src="/me/avatar" alt="" aria-hidden="true"
             onerror="this.remove()"/>
        <span th:text="${currentUserName}">Name</span>
    </span>
</header>
</body>
</html>
